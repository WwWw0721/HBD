<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 專屬解謎</title>
    <style>
        /* 網頁的視覺設計 */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #fff0f5; /* 柔和的粉紅色背景 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 400px; 
            width: 85%; 
        }
        h2 { color: #333; }
        p { color: #666; line-height: 1.5; }
        input { 
            padding: 12px; 
            margin: 20px 0; 
            border: 2px solid #ffb6c1; 
            border-radius: 8px; 
            width: 80%; 
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #ff69b4; }
        button { 
            background-color: #ff69b4; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #ff1493; }
        .hidden { display: none; }
        .error { color: #ff0000; font-size: 14px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="level1">
        <h2>🧩 第一關：我們的起點</h2>
        <p>還記得我們第一次約會去哪裡嗎？<br>（提示：兩個字）</p>
        <input type="text" id="answer1" placeholder="輸入妳的答案...">
        <br>
        <button onclick="checkAnswer()">確認送出</button>
        <p id="error-msg" class="hidden error">密碼錯誤，再想想看！</p>
    </div>

    <div class="card hidden" id="success">
        <h2>🎉 恭喜通關！</h2>
        <p>寶貝生日快樂！這只是剛開始，接下來的驚喜藏在...</p>
        </div>

    <script>
        // 判斷答案的邏輯
        function checkAnswer() {
            const ans = document.getElementById('answer1').value.trim();
            const errorMsg = document.getElementById('error-msg');
            
            // ★ 將這裡的 '淡水' 替換成你真正設定的答案 ★
            if(ans === '淡水' || ans === 'tamsui') {
                // 答案正確：隱藏第一關，顯示通關畫面
                document.getElementById('level1').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
                errorMsg.classList.add('hidden');
            } else {
                // 答案錯誤：顯示錯誤訊息
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
